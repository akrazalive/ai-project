version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: aijobs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    depends_on:
      - db
      - redis

  celery:
    build: ./backend
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file: ./backend/.env
    depends_on:
      - db
      - redis

  celery-beat:
    build: ./backend
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file: ./backend/.env
    depends_on:
      - db
      - redis

  job_service:
    build: ./job_service
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./job_service:/app
    ports:
      - "8001:8001"

  ai_service:
    build: ./ai_service
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    volumes:
      - ./ai_service:/app
    ports:
      - "8002:8002"
    env_file: ./ai_service/.env

volumes:
  pgdata:
